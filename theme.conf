[General]
# DimArch SDDM Theme 1.3.1

# Background
BgSource=backgrounds/login-lock.jpg
FallbackBg=#2C2C2C
OverlayColor=#FFFFFF
OverlayOpacity=0.12

# Primary monitor geometry.
# 0 = auto (uses full screen — correct for single monitor setups).
PrimaryX=0
PrimaryY=0
PrimaryWidth=0
PrimaryHeight=0

# UI scale factor. 0 = auto-detect from monitor height.
UiScale=0

# Login card
CardWidth=420
CardHeight=0
CardRadius=32

CardPadding=34
CardSpacing=8

CardContentTopMargin=24
CardFooterGap=18
CardBottomPadding=20

FooterHeight=50
FooterIconSpacing=38

FormWidthRatio=0.84

CardBg=#FFFFFF
CardBgOpacity=0.72

CardBorder=#FFFFFF
CardBorderOpacity=0.55

CardTopHighlightOpacity=0.12

# Avatar priority:
# 1. /home/<user>/.face.icon
# 2. /home/<user>/.face
# 3. ThemeAvatar, if set
# 4. DA fallback
AvatarSize=86
AvatarMonogram=DA
ThemeAvatar=

# Welcome title and system name.
WelcomePrefix=Welcome to
SystemName=Linux

# Locale strings.
LabelPassword=Password
LabelSignIn=Sign In
LabelSession=Session:
ErrorWrongPassword=Wrong password
ErrorEmptyPassword=Please enter your password

# Colors
TextPrimary=#1F2933
TextSecondary=#52606D
AccentGreen=#7FB89E
DangerRed=#E53E3E

# Input
InputHeight=50
InputRadius=12
InputBg=#F5F7FA
InputBorder=#CBD2D9
InputBorderFocus=#7FB89E
InputPlaceholder=#9AA5B1
InputText=#1F2933

# Button
ButtonHeight=50
ButtonRadius=12
ButtonBg=#7FB89E
ButtonHover=#6AAE8A
ButtonPressed=#5A9A78
ButtonText=#FFFFFF

# Clock
ClockSize=72
WeekdaySize=22
DateSize=18
ClockColor=#FFFFFF
ClockShadow=#00000040

# Font
FontFamily=Inter

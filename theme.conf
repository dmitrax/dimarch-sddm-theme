[General]
# DimArch SDDM Theme 1.3.1

# Theme-local background.
# Runtime path:
# /usr/share/sddm/themes/dimarch/backgrounds/login-lock.jpg
BgSource=backgrounds/login-lock.jpg
FallbackBg=#d8e2df
OverlayColor=#FFFFFF
OverlayOpacity=0.12

# Primary monitor geometry.
# 0 = auto (uses full screen — correct for single monitor setups).
# For multi-monitor: set to the physical pixel position and size of your login monitor.
#
# Examples:
#   Left monitor  1920x1080:  PrimaryX=0,    PrimaryY=0, PrimaryWidth=1920, PrimaryHeight=1080
#   Right monitor 1920x1080:  PrimaryX=1920, PrimaryY=0, PrimaryWidth=1920, PrimaryHeight=1080
#   Right monitor 4K:         PrimaryX=1920, PrimaryY=0, PrimaryWidth=3840, PrimaryHeight=2160
PrimaryX=0
PrimaryY=0
PrimaryWidth=0
PrimaryHeight=0

# UI scale factor. 0 = auto-detect from monitor height:
#   >= 2160px (4K)   → 1.5
#   >= 1440px        → 1.2
#   >= 1080px        → 1.0
#   <  1080px        → 0.85
# Set explicitly to override: 1.0, 1.2, 1.5, 2.0
UiScale=0

# Welcome title and system name.
# To update after installation:
#   sudo /usr/share/sddm/themes/dimarch/scripts/update-theme.sh
#   sudo /usr/share/sddm/themes/dimarch/scripts/update-theme.sh --name "DimArch OS"
#   sudo /usr/share/sddm/themes/dimarch/scripts/update-theme.sh --locale ru
WelcomePrefix=Welcome to
SystemName=Arch Linux

# Locale strings.
# Managed by update-theme.sh — edit manually or run the script.
# Available locales: locale/en.conf  locale/ru.conf
LabelPassword=Password
LabelSignIn=Sign In
LabelSession=Session:
ErrorWrongPassword=Wrong password
ErrorEmptyPassword=Please enter your password

# Typography
FontFamily=Inter

# Login card
CardWidth=530
CardHeight=465
CardRadius=32
CardBg=#CFFFFFFF
CardBorder=#99FFFFFF
CardPadding=40
CardSpacing=13

# Avatar priority:
# 1. /home/<user>/.face.icon
# 2. /home/<user>/.face
# 3. ThemeAvatar, if set
# 4. DA fallback
AvatarSize=86
AvatarMonogram=DA
ThemeAvatar=

# Input
InputHeight=54
InputRadius=16
InputBg=#EEF7F8FA
InputBorder=#D1D5DB
InputBorderFocus=#7FB89E
InputPlaceholder=#9CA3AF
InputText=#1F2933

# Button
ButtonHeight=54
ButtonRadius=16
ButtonBg=#7FB89E
ButtonHover=#6FAF8F
ButtonPressed=#5E9F82
ButtonText=#FFFFFF

# Clock
ClockSize=78
WeekdaySize=24
DateSize=18
ClockColor=#F8FAFC
ClockShadow=#33000000

# Text
TextPrimary=#1F2933
TextSecondary=#6B7280
TextMuted=#9CA3AF
TextOnDark=#F8FAFC
AccentGreen=#7FB89E
DangerRed=#D96C6C
